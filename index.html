<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zhax Store Premium</title>
<link rel="stylesheet" href="../css/style.css">
<script defer src="../js/app.js"></script>
</head>
<body>
<nav>
<div class="logo">Zhax Store</div>
<div>
<a href="index.html">Home</a>
<a href="login.html">Login</a>
<a href="register.html">Register</a>
<a href="dashboard.html">Dashboard</a>
</div>
<button id="themeToggle">🌙</button>
</nav>

<header class="hero">
<h1>Premium Gaming Store</h1>
<p>Topup, Joki Rank, Checkout Otomatis & Payment Gateway</p>
<input type="text" id="searchInput" placeholder="Cari produk/game...">
</header>

<section class="grid" id="productGrid">

<div class="card">
<h2>Mobile Legends</h2>
<p>Joki Rank Premium</p>
<select>
<option>Grandmaster</option>
<option>Epic</option>
<option>Legend</option>
<option>Mythic</option>
<option>Mythic Honor</option>
<option>Mythic Glory</option>
<option>Mythic Immortal</option>
</select>
<button onclick="orderWA('Mobile Legend')">Order</button>
</div>

<div class="card">
<h2>Free Fire</h2>
<p>Joki Rank</p>
<button onclick="orderWA('Free Fire')">Order</button>
</div>

<div class="card">
<h2>PUBG</h2>
<p>Joki Rank</p>
<button onclick="orderWA('PUBG')">Order</button>
</div>

<div class="card">
<h2>Arena Breakout</h2>
<select>
<option>Mandor/VIP</option>
<option>Value</option>
<option>Koen</option>
</select>
<button onclick="orderWA('Arena Breakout')">Order</button>
</div>

</section>

<section class="payments">
<h2>Metode Pembayaran</h2>
<div class="payment-list">
<div>QRIS</div>
<div>Dana</div>
<div>OVO</div>
<div>GoPay</div>
</div>
</section>

<footer>
<p>© 2026 Zhax Store</p>
</footer>

</body>
</html>
